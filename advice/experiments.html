# Tips for performing experiments in deep RL

Here are some tips when running deep RL experiments:

- Try to automate your experiments

- Write scripts for your experiments so that your experiments can be easily repeated

- Use different folders for each experiment, possibly add a README to explain why this experiment is performed

- Since DRL experiments may take a long time, try to think carefully if you really need to perform some experiments, or if their results could be deduced from other experiments

- Here are some code snippets that can be helpful for plotting

  def plot_data2(data_matrix, ax, lcolor, lline, p, lmarker=''):
    plot_only_each_n_point=100
    data_matrix=data_matrix.reshape((int(data_matrix.shape[0]*plot_only_each_n_point),
                            int(data_matrix.shape[1]/plot_only_each_n_point)), order='F')
    x = np.arange(0, data_matrix.shape[1])
    x2= np.arange(0, data_matrix.shape[1])*p*plot_only_each_n_point
    lx = np.arange(0, data_matrix.shape[1], 1)
    lx2 = np.arange(0, data_matrix.shape[1])*p*plot_only_each_n_point
    ymean = np.mean(data_matrix, axis=0)
    ys=data_matrix
    ystd = np.std(ys, axis=0)
    ystderr = ystd / np.sqrt(len(ys))
    ax.fill_between(lx2*p, ymean - ystderr, ymean + ystderr, color=lcolor, alpha=.4)
    ax.fill_between(lx2*p, ymean - ystd,    ymean + ystd,    color=lcolor, alpha=.2)
    ax.plot(lx2*p, ymean[lx], linewidth=2, linestyle=lline, color=lcolor,
            marker=lmarker, markevery=1000, markersize=4.5)
${'```'}

  def plot_from_file(path, fig, subplot, color, sign):
    results2 = []
    for directory in glob.iglob(path+'**/results/', recursive=True):
        print(directory)
        results = []
        for index in range(1,20):
            for filename in glob.iglob(directory+'**_run'+str(index)+'.csv', recursive=False):
                subresults = pd.read_csv(filename,  compression='gzip', sep=",")
                subresults = subresults['Reward']
                results.append(subresults)
        results = np.array(results)
        results = results.reshape(results.shape[0]*results.shape[1])        
        results2.append(results)
 
    results2 = np.array(results2)
    ax=fig.add_subplot(subplot)
    plot_data2(results2, ax, color, sign, 1)
    return ax

To evaluate, you can use the below script to compute the mean/variance of your results.

${'```'}python
  def plot_from_file(path, fig, subplot, color, sign):
    results2 = []
    for directory in glob.iglob(path+'**/results/', recursive=True):
        print(directory)
        results = []
        for index in range(31, 40):
            for filename in glob.iglob(directory+'**_run'+str(index)+'.csv', recursive=False):
                subresults = pd.read_csv(filename, compression='gzip', sep=",")
                subresults = [subresults['Reward'], subresults['Balance']]
 
                results.append(np.array(subresults).transpose())
 
        results = np.array(results)
        results = results.mean(axis=1).mean(axis=0)
        results2.append(results)
 
    results2 = np.array(results2)
    reward = results2[0]
    Balance = results2[1]
    print('Reward  and balance of my transaction is', np.mean(reward), np.mean(Balance))
    return np.array([reward, Balance]).transpose()
